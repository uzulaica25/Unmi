<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unmi- Hasiera</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #212529;
    }

    .login-wrapper {
      min-height: 100vh;
    }

    /* LOGIN BOX */
    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .logo-login {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 2px solid #111338;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #111338;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #1f2250;
    }

    .back-btn {
      background: #6c757d;
    }

    .back-btn:hover {
      background: #5a6268;
    }

    .error {
      color: red;
      display: none;
      margin-top: 10px;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      color: #666;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #ccc;
    }

    .divider::before {
      margin-right: 10px;
    }

    .divider::after {
      margin-left: 10px;
    }
  </style>
</head>

<body>

<div class="container login-wrapper d-flex justify-content-center align-items-center">

  <!-- LOGIN -->
  <div class="login-box">

    <img src="UNMI.png" class="logo-login" alt="logo">

    <h4>Login</h4>

    <input type="text" id="user" placeholder="Erabiltzailea">
    <input type="password" id="pass" placeholder="Pasahitza">

    <button onclick="login()">Sartu</button>

    <div class="divider">edo</div>

    <button class="back-btn" onclick="goBack()">Atzera</button>

    <p class="error" id="error">Erabiltzailea edo pasahitza okerra</p>

  </div>

</div>

<script>
  function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    const correctUser = "admin";
    const correctPass = "1234";

    if (user === correctUser && pass === correctPass) {
      window.location.href = "Admin.html";
    } else {
      document.getElementById("error").style.display = "block";
    }
  }

  function goBack() {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
